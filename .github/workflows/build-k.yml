name: Build Kernel with Neutron Clang (Antman)

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Branch to build (e.g., Lineage-aospa-Temp)'
        required: true
        default: 'Lineage-aospa-Temp'
      defconfig:
        description: 'Defconfig name (without path)'
        required: true
        default: 'vendor/lahaina-qgki_defconfig'
      enable_kernelsu_next:
        description: 'Enable KernelSU Next (yes/no)'
        required: false
        default: 'no'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.kernel_branch }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev make libelf-dev lz4 cpio \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            build-essential clang lld llvm device-tree-compiler \
            python3 python3-pip zip git ccache wget xz-utils zstd

      - name: Setup Neutron Clang with antman
        run: |
          set -e
          TOOLCHAIN_DIR="$HOME/toolchains/neutron-clang"
          echo "Cleaning old toolchain..."
          rm -rf "$TOOLCHAIN_DIR"
          mkdir -p "$TOOLCHAIN_DIR"
          cd "$TOOLCHAIN_DIR"

          echo "Downloading antman script..."
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman

          echo "Syncing latest Neutron Clang build..."
          ./antman -S

          echo "Applying glibc compatibility patch..."
          ./antman --patch=glibc || echo "glibc patch skipped (not required)"

          echo "NEUTRON_PATH=$TOOLCHAIN_DIR" >> $GITHUB_ENV

      - name: Set up environment for Neutron Clang
        run: |
          echo "${{ env.NEUTRON_PATH }}/bin" >> $GITHUB_PATH
          echo "KBUILD_BUILD_USER=Willay" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=Linux" >> $GITHUB_ENV
          CLANG_VERSION=$(${{ env.NEUTRON_PATH }}/bin/clang --version | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          COMPILER_STRING="Neutron clang version ${CLANG_VERSION} (https://github.com/llvm/llvm-project.git fd3eaf76ba3392a4406247d996e757ef49f7a8b2), Neutron LLD ${CLANG_VERSION})"
          echo "KBUILD_COMPILER_STRING=$COMPILER_STRING" >> $GITHUB_ENV

      - name: Setup KernelSU Next (if enabled)
        if: ${{ github.event.inputs.enable_kernelsu_next == 'yes' }}
        run: |
          echo "🔧 Enabling KernelSU Next..."

          # Step 1: Run the KernelSU Next setup script
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

          # Step 2: Remove the KernelSU Next folder created by setup
          rm -rf KernelSU-Next

          # Step 3: Clone sidex15's KernelSU Next branch (legacy-susfs-v2)
          git clone --depth=1 \
            https://github.com/sidex15/KernelSU-Next.git \
            -b legacy-susfs-v2 \
            KernelSU-Next

          # Add CONFIG_KSU=y to defconfig
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"
          if [ -f "$DEFCONFIG_PATH" ]; then
            echo "✅ Adding CONFIG_KSU=y to defconfig"
            echo -e "\n# KernelSU Next\nCONFIG_KSU=y" >> "$DEFCONFIG_PATH"
          fi

      - name: Configure kernel (defconfig)
        run: |
          make O=out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ \
            LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-unknown-warning-option" \
            ${{ github.event.inputs.defconfig }}

      # -------------------------------------------------------------------
      # Build kernel Image + dtbs in a single make invocation.
      # "Image dtbs" builds the kernel image and all device tree blobs
      # without entering the module compilation stage, so no redundant
      # LTO / vmlinux / kallsyms rebuild happens afterward.
      # -------------------------------------------------------------------
      - name: Build kernel Image and dtbs
        run: |
          make O=out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ \
            LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-unknown-warning-option" \
            -j$(nproc --all) Image dtbs

      # If Image is truly missing, the build failed — stop here.
      - name: Verify Image was produced
        run: |
          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "✅ Image found — proceeding to dtb/dtbo packaging"
          else
            echo "❌ Image not found — kernel build truly failed"
            exit 1
          fi

      # -------------------------------------------------------------------
      # Collect dtb and dtbo.img produced by the dtbs target above.
      #
      # dtb  — all per-board .dtb files under out/arch/arm64/boot/dts/
      #         are concatenated into a single blob (same method used by
      #         the reference compile.sh zipper() function).
      # dtbo.img — mkdtimg output dropped directly into boot/ by the
      #            kernel build; copied as-is if present.
      # -------------------------------------------------------------------
      - name: Collect dtb and dtbo.img
        run: |
          BOOT_OUT="out/arch/arm64/boot"
          DTS_OUT="$BOOT_OUT/dts"

          # ── merged dtb ──────────────────────────────────────────────────
          # Walk the full dts tree and concatenate every .dtb file into one
          # blob, matching the reference script's approach:
          #   find "$DTB_PATH"/vendor/*/* -name '*.dtb' -exec cat {} + > dtb
          #
          # We try the vendor sub-tree first (lahaina layout), then fall back
          # to a flat search of the entire dts directory.
          echo "🔍 Searching for .dtb files..."

          DTB_DEST="$BOOT_OUT/dtb"
          if find "$DTS_OUT/vendor" -name '*.dtb' 2>/dev/null | grep -q .; then
            echo "✅ Found .dtb files under dts/vendor — merging..."
            find "$DTS_OUT/vendor" -name '*.dtb' -exec cat {} + > "$DTB_DEST"
          elif find "$DTS_OUT" -name '*.dtb' 2>/dev/null | grep -q .; then
            echo "⚠️  No vendor sub-tree — merging all .dtb files found in dts/..."
            find "$DTS_OUT" -name '*.dtb' -exec cat {} + > "$DTB_DEST"
          else
            echo "⚠️  No .dtb files found — dtb blob will not be included in zip"
          fi

          # ── dtbo.img ────────────────────────────────────────────────────
          if [ -f "$BOOT_OUT/dtbo.img" ]; then
            echo "✅ dtbo.img found"
          else
            echo "⚠️  dtbo.img not present — skipping (non-fatal)"
          fi

          # Report what we have
          echo "── Boot artifacts ──────────────────────"
          ls -lh "$BOOT_OUT/Image" "$BOOT_OUT/dtb" "$BOOT_OUT/dtbo.img" 2>/dev/null || true
          echo "────────────────────────────────────────"

      - name: Prepare AnyKernel3 package
        run: |
          git clone --depth=1 https://github.com/William24hmar/AnyKernel3.git -b master anykernel

          BOOT_OUT="out/arch/arm64/boot"

          cp "$BOOT_OUT/Image" anykernel/

          [ -f "$BOOT_OUT/dtb" ]      && cp "$BOOT_OUT/dtb"      anykernel/ && echo "✅ dtb copied"      || echo "⚠️  dtb not found, skipping"
          [ -f "$BOOT_OUT/dtbo.img" ] && cp "$BOOT_OUT/dtbo.img" anykernel/ && echo "✅ dtbo.img copied" || echo "⚠️  dtbo.img not found, skipping"

      - name: Create flashable ZIP
        run: |
          cd anykernel
          ZIP_NAME="Neutrino-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../$ZIP_NAME" * -x "*.git*" "README.md"
          cd ..
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV
          echo "✅ Zip created: $ZIP_NAME"

      - name: Upload flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Neutrino-Kernel-flashable
          path: ${{ env.ZIP_FILE }}

          
