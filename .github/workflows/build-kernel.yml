name: Build Kernel Only (Nothing Phone 1)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🧰 Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex git kmod \
          libssl-dev libncurses5-dev libelf-dev python3

      - name: 🧪 Clone Clang
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang

      - name: ⚙️ Setup environment
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: 🏗️ Build kernel
        run: |
          cd android_kernel_msm-5.4_nothing_sm7325
          mkdir -p out
          source build.config.gki.aarch64
          make O=out CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc)

      - name: 📦 Upload kernel
        uses: actions/upload-artifact@v3
        with:
          name: kernel-output
          path: |
            android_kernel_msm-5.4_nothing_sm7325/out/arch/arm64/boot/Image*
